<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mecha - Asistente Virtual</title>

  <!-- Script oficial de Dialogflow ES Messenger (CDN Google, sin XSS) -->
  <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

  <style>
    /* ─── Reset base ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #f4edf7;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* ─── FULMINAR LAUNCHER Y FORZAR INCUSTRARE HORIZONTAL ─────────── */
    df-messenger {
      position: relative !important;
      display: block !important;
      width: 100% !important;
      height: 100% !important;

      /* Dimensiones fijas horizontales */
      --df-messenger-chat-window-width: 100% !important;
      --df-messenger-chat-window-height: 350px !important;
      --df-messenger-shadow-wrapper-background: transparent !important;

      /* Paleta Violeta */
      --df-messenger-brand-color: #8E44AD !important;
      --df-messenger-titlebar-background: #8E44AD !important;
      --df-messenger-titlebar-font-color: #ffffff !important;
      --df-messenger-titlebar-icon-color: #ffffff !important;

      /* Burbujas y Fondos */
      --df-messenger-message-bot-background: #f0e5fc !important;
      --df-messenger-message-bot-font-color: #2d0052 !important;
      --df-messenger-message-user-background: #8E44AD !important;
      --df-messenger-message-user-font-color: #ffffff !important;
      --df-messenger-chat-background-color: #faf5ff !important;

      /* Caja de texto inferior */
      --df-messenger-input-box-color: #f3e8ff !important;
      --df-messenger-input-font-color: #2d0052 !important;
      --df-messenger-input-placeholder-font-color: #9b7bb8 !important;
      --df-messenger-send-icon: #8E44AD !important;
    }

    /* Ocultar el botón flotante (launcher) por CSS estándar y por partes */
    df-messenger::part(launcher),
    df-messenger-chat-bubble,
    .df-messenger-chat-bubble,
    button#widgetIcon {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
      width: 0 !important;
      height: 0 !important;
    }

    /* ─── Contenedor HORIZONTAL RECTANGULAR ───────────────────────── */
    .caja-mecha-premium {
      width: min(96vw, 960px);
      height: 350px !important; /* Altura chata para formato horizontal */
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 8px 32px rgba(142, 68, 173, 0.25),
        0 2px 8px  rgba(142, 68, 173, 0.10);
    }

    /* ══════════════════════════════════════════════════════════════════
       MEDIA QUERIES — RESPONSIVE MÓVIL
       ══════════════════════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      .caja-mecha-premium {
        width: calc(100% - 16px);
        height: 380px !important;
      }
    }

    @media (max-width: 480px) {
      html, body { align-items: stretch; }
      .caja-mecha-premium {
        width: 100%;
        height: 100vh !important;
        height: 100dvh !important;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>

  <!-- El truco maestro: El chat dentro de la caja premium -->
  <div class="caja-mecha-premium">
    <df-messenger
      intent="WELCOME"
      chat-title="Mecha"
      agent-id="e0dbe63b-3c93-40ad-9c32-efd39b5f4fc3"
      language-code="es"
      expand="true">
    </df-messenger>
  </div>

  <script>
    /* Inyección forzada en tiempo real para ganarle la pulseada al script de Google */
    function domarComponente() {
      var df = document.querySelector('df-messenger');
      if (!df) return;

      // Forzar que el chat interno ocupe el contenedor horizontal sin estirarse al infinito vertical
      try {
        var styleN1 = df.shadowRoot.querySelector('#mecha-override') || document.createElement('style');
        styleN1.id = 'mecha-override';
        styleN1.textContent = `
          .df-messenger-wrapper, .chat-wrapper, df-messenger-chat { 
            width: 100% !important; 
            height: 350px !important; 
            max-height: 350px !important;
          }
          button#widgetIcon, .df-messenger-chat-bubble { display: none !important; }
        `;
        df.shadowRoot.appendChild(styleN1);

        var chat = df.shadowRoot.querySelector('df-messenger-chat');
        if (chat && chat.shadowRoot) {
          var styleN2 = chat.shadowRoot.querySelector('#mecha-override-chat') || document.createElement('style');
          styleN2.id = 'mecha-override-chat';
          styleN2.textContent = `
            .chat-window { height: 350px !important; max-height: 350px !important; width: 100% !important; box-shadow: none !important; }
            df-messenger-titlebar { background-color: #8E44AD !important; }
          `;
          chat.shadowRoot.appendChild(styleN2);
        }
      } catch (e) {}
    }

    // Ejecutar inmediatamente y con intervalos por si Google tarda en renderizar
    window.addEventListener('dfMessengerLoaded', domarComponente);
    [100, 500, 1000, 2000].forEach(ms => setTimeout(domarComponente, ms));
  </script>

</body>
</html>
